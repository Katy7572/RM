# 机构业务看板每日自动刷新
# 每天 21:30 (UTC+8 = 13:30 UTC) 自动执行

name: Daily Board Refresh

on:
  schedule:
    - cron: '30 13 * * 1-5'  # 周一至周五 13:30 UTC = 21:30 北京时间
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 刷新资本动作 + 高管变动
        run: python cninfo_dashboard_updater_v2.py
        working-directory: WorkBuddy

      - name: 刷新行情数据
        continue-on-error: true
        run: python refresh_market_v3.py
        working-directory: js_stock_tracker

      - name: 刷新新闻舆情
        continue-on-error: true
        run: python fetch_real_news.py
        working-directory: js_stock_tracker

      - name: 检查变更
        id: diff
        run: |
          git diff --stat
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交更新
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "自动刷新 $(date '+%Y-%m-%d %H:%M CST')"
          git push
